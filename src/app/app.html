<header class="site-header">
  <a routerLink="/" class="logo" aria-label="Road Travel home">
    <img class="brand-logo brand-logo-light" src="logo-horizontal-light-2x.png"
         srcset="logo-horizontal-light-2x.png 2x" alt="Road Travel" />
    <img class="brand-logo brand-logo-dark" src="logo-horizontal-dark-2x.png"
         srcset="logo-horizontal-dark-2x.png 2x" alt="Road Travel" />
  </a>
  <nav class="site-nav">
    <!-- App Store link (T-021): the web app's only link to the iOS app. It used to live on the
         marketing home page; now it's a persistent header item so it's reachable from every route.
         External store link → new tab; not an in-app nav destination. -->
    <a class="nav-link nav-cta nav-store" href="https://apps.apple.com/app/id6785563236"
       target="_blank" rel="noopener" aria-label="Get the iOS app on the App Store">
      <svg class="apple-glyph" viewBox="0 0 384 512" width="14" height="14" aria-hidden="true"
           fill="currentColor">
        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3
                 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4
                 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4
                 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4
                 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2
                 49.9-11.4 69.5-34.3z" />
      </svg>
      Get the iOS app
    </a>
    @if (auth.hasRealAccount()) {
      <!-- The identity chip is the app-wide "you are signed in (as X)" signal — without it, signing
           in looks like nothing happened, since guests get a silent anonymous session anyway.
           Shows the profile name when one is set (F-003), otherwise the account email. -->
      <a routerLink="/settings" class="nav-id" [title]="auth.email()">{{ profile.headerName() }}</a>
      <a routerLink="/saved" class="nav-link">My trips</a>
      <a routerLink="/driving" class="nav-link">Driving</a>
      <a routerLink="/settings" class="nav-link">Settings</a>
      <button type="button" class="nav-link" (click)="auth.signOut()">Sign out</button>
    } @else {
      <a routerLink="/login" class="nav-link nav-cta">Sign in</a>
    }
  </nav>
</header>

@if (auth.authError(); as err) {
  <div class="auth-error" role="alert">
    <span>{{ err }}</span>
    <button type="button" (click)="auth.authError.set(null)" aria-label="Dismiss">✕</button>
  </div>
}

<router-outlet />

<!-- App-wide paywall overlay (F-002): shown when a 402 free-tier cap fires. -->
<app-paywall />

<!-- App-wide onboarding form (F-003): shown after sign-in when not yet onboarded. -->
<app-onboarding />

<footer class="site-footer">
  <p>&copy; 2026 Road Travel &nbsp;·&nbsp;
    <a routerLink="/privacy">Privacy</a> &nbsp;·&nbsp;
    <a routerLink="/support">Support</a>
  </p>
</footer>
